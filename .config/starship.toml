# starship config (starship.toml)

add_newline = false

continuation_prompt = ' '

format='$character$cmd_duration$git_branch$directory'

[character]
error_symbol = '[](bright-red)[!](fg:black bg:bright-red)[](bright-red) '
success_symbol = ''
vimcmd_replace_one_symbol = ''
vimcmd_replace_symbol = ''
vimcmd_symbol = ''
vimcmd_visual_symbol = ''
format = '$symbol'
disabled = false

[cmd_duration]
style  = 'fg:black bg:bright-yellow bold'
format = '[](bright-yellow)[$duration]($style)[](bright-yellow) '
min_time = 2000
min_time_to_notify = 45000
#notification_timeout = 
show_milliseconds = false
show_notifications = false
disabled = false

[git_branch]
style = 'fg:black bg:bright-purple'
symbol = ''
format = '[](bright-purple)[$symbol $branch(:$remote_branch)]($style)[](bright-purple) '
always_show_remote = false
ignore_branches = []
only_attached = false
#truncation_length = 2^63 - 1
truncation_symbol = '…'
disabled = false

[directory]
style = 'fg:black bg:bright-white'
format = '[](bright-white)[$path]($style)[](bright-white) '
home_symbol = '~'
truncate_to_repo = true
truncation_length = 5
truncation_symbol = '…/'
disabled = false
